<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园 AI 秘书 - 管理后台</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.13.7/dist/index.css">
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/element-plus@2.13.7/dist/index.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@element-plus/icons-vue@2/dist/index.iife.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <div id="app">
        <Login v-if="!isLoggedIn" @login-success="handleLoginSuccess"></Login>
        
        <div v-else class="admin-layout">
            <Sidebar :active-menu="activeMenu" @menu-change="handleMenuChange"></Sidebar>
            <div class="main-content">
                <Header :title="pageTitle" :current-user="currentUser" @logout="handleLogout"></Header>
                <div class="content-area">
                    <Dashboard v-if="activeMenu === 'dashboard'"></Dashboard>
                    <user-management v-else-if="activeMenu === 'users'"></user-management>
                    <schedule-management v-else-if="activeMenu === 'schedules'"></schedule-management>
                    <knowledge-base v-else-if="activeMenu === 'knowledge'"></knowledge-base>
                    <collected-info v-else-if="activeMenu === 'collected'"></collected-info>
                    <Reminders v-else-if="activeMenu === 'reminders'"></Reminders>
                    <Internships v-else-if="activeMenu === 'internships'"></Internships>
                    <push-message v-else-if="activeMenu === 'push'"></push-message>
                    <smart-push v-else-if="activeMenu === 'smartpush'"></smart-push>
                    <student-profile v-else-if="activeMenu === 'profile'"></student-profile>
                    <job-match v-else-if="activeMenu === 'jobmatch'"></job-match>
                    <Settings v-else-if="activeMenu === 'settings'"></Settings>
                </div>
            </div>
        </div>
    </div>

    <script type="text/x-template" id="login-template">
        <div class="login-container">
            <div class="login-box">
                <h2 class="login-title">🎓 校园 AI 秘书</h2>
                <h3 style="text-align: center; margin-bottom: 20px; color: #666;">管理后台</h3>
                <el-form :model="loginForm" ref="loginFormRef">
                    <el-form-item prop="username">
                        <el-input v-model="loginForm.username" placeholder="用户名" prefix-icon="User" size="large"></el-input>
                    </el-form-item>
                    <el-form-item prop="password">
                        <el-input v-model="loginForm.password" type="password" placeholder="密码" prefix-icon="Lock" size="large" @keyup.enter="handleLogin"></el-input>
                    </el-form-item>
                    <el-form-item>
                        <el-button type="primary" @click="handleLogin" size="large" :loading="loading" style="width: 100%;">登录</el-button>
                    </el-form-item>
                </el-form>
                <div style="text-align: center; color: #999; font-size: 12px; margin-top: 15px;">默认账号：admin / admin123</div>
            </div>
        </div>
    </script>

    <script type="text/x-template" id="sidebar-template">
        <div class="sidebar">
            <div class="sidebar-logo">🎓 校园 AI 秘书</div>
            <el-menu :default-active="activeMenu" background-color="#001529" text-color="rgba(255,255,255,0.65)" active-text-color="#fff" class="sidebar-menu" mode="vertical">
                <el-menu-item index="dashboard" @click="handleMenuClick('dashboard')"><el-icon><component :is="'DataAnalysis'" /></el-icon><span>仪表盘</span></el-menu-item>
                
                <el-sub-menu index="management">
                    <template #title><el-icon><component :is="'Folder'" /></el-icon><span>管理类</span></template>
                    <el-menu-item index="users" @click="handleMenuClick('users')"><el-icon><component :is="'User'" /></el-icon><span>用户管理</span></el-menu-item>
                    <el-menu-item index="schedules" @click="handleMenuClick('schedules')"><el-icon><component :is="'Calendar'" /></el-icon><span>日程管理</span></el-menu-item>
                </el-sub-menu>
                
                <el-sub-menu index="information">
                    <template #title><el-icon><component :is="'Search'" /></el-icon><span>信息获取</span></template>
                    <el-menu-item index="knowledge" @click="handleMenuClick('knowledge')"><el-icon><component :is="'Document'" /></el-icon><span>知识库</span></el-menu-item>
                    <el-menu-item index="collected" @click="handleMenuClick('collected')"><el-icon><component :is="'Message'" /></el-icon><span>采集信息</span></el-menu-item>
                    <el-menu-item index="reminders" @click="handleMenuClick('reminders')"><el-icon><component :is="'Bell'" /></el-icon><span>提醒日志</span></el-menu-item>
                    <el-menu-item index="internships" @click="handleMenuClick('internships')"><el-icon><component :is="'Briefcase'" /></el-icon><span>实习信息</span></el-menu-item>
                </el-sub-menu>
                
                <el-sub-menu index="push">
                    <template #title><el-icon><component :is="'Send'" /></el-icon><span>信息推送</span></template>
                    <el-menu-item index="push-message" @click="handleMenuClick('push')"><span>📤</span><span>消息推送</span></el-menu-item>
                    <el-menu-item index="smartpush" @click="handleMenuClick('smartpush')"><el-icon><component :is="'Cpu'" /></el-icon><span>智能推送</span></el-menu-item>
                </el-sub-menu>
                
                <el-sub-menu index="ai">
                    <template #title><el-icon><component :is="'Brain'" /></el-icon><span>AI分析</span></template>
                    <el-menu-item index="profile" @click="handleMenuClick('profile')"><el-icon><component :is="'UserFilled'" /></el-icon><span>学生画像</span></el-menu-item>
                    <el-menu-item index="jobmatch" @click="handleMenuClick('jobmatch')"><el-icon><component :is="'Target'" /></el-icon><span>岗位匹配</span></el-menu-item>
                </el-sub-menu>
                
                <el-menu-item index="settings" @click="handleMenuClick('settings')"><el-icon><component :is="'Setting'" /></el-icon><span>系统设置</span></el-menu-item>
            </el-menu>
        </div>
    </script>

    <script type="text/x-template" id="header-template">
        <div class="header">
            <h3>{{ title }}</h3>
            <div>
                <el-dropdown @command="handleCommand">
                    <span style="cursor: pointer;"><el-icon><component :is="'UserFilled'" /></el-icon>{{ currentUser.username }}<el-icon><component :is="'ArrowDown'" /></el-icon></span>
                    <template #dropdown>
                        <el-dropdown-menu>
                            <el-dropdown-item command="logout">退出登录</el-dropdown-item>
                        </el-dropdown-menu>
                    </template>
                </el-dropdown>
            </div>
        </div>
    </script>

    <script type="text/x-template" id="dashboard-template">
        <div>
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-label">总用户数</div><div class="stat-value">{{ store.stats.users?.total || 0 }}</div><div style="color: #67C23A; font-size: 12px;">活跃：{{ store.stats.users?.active || 0 }}</div></div>
                <div class="stat-card"><div class="stat-label">总日程数</div><div class="stat-value">{{ store.stats.schedules?.total || 0 }}</div><div style="color: #666; font-size: 12px;">今日：{{ store.stats.schedules?.today || 0 }}</div></div>
                <div class="stat-card"><div class="stat-label">提醒总数</div><div class="stat-value">{{ store.stats.reminders?.total || 0 }}</div><div style="color: #666; font-size: 12px;">今日：{{ store.stats.reminders?.today || 0 }}</div></div>
                <div class="stat-card"><div class="stat-label">知识库条目</div><div class="stat-value">{{ store.stats.knowledge?.total || 0 }}</div><div style="color: #666; font-size: 12px;">今日新增：{{ store.stats.knowledge?.today || 0 }}</div></div>
            </div>
            <div style="display: flex; gap: 20px; margin-top: 20px;">
                <div style="flex: 1; background: white; border-radius: 8px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.1);">
                    <h4 style="margin-bottom: 15px;">日程统计</h4>
                    <div id="scheduleChart" style="height: 250px;"></div>
                </div>
                <div style="flex: 1; background: white; border-radius: 8px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.1);">
                    <h4 style="margin-bottom: 15px;">提醒统计</h4>
                    <div id="reminderChart" style="height: 250px;"></div>
                </div>
            </div>
        </div>
    </script>

    <script type="text/x-template" id="user-management-template">
        <div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <div><el-input v-model="searchQuery" placeholder="搜索用户名或昵称" style="width: 300px;" @input="searchUsers"></el-input></div>
                <el-button type="primary" @click="showAddUser = true">添加用户</el-button>
            </div>
            <el-table :data="store.users" border style="width: 100%;" :loading="store.loading">
                <el-table-column prop="id" label="ID" width="80"></el-table-column>
                <el-table-column prop="username" label="用户名"></el-table-column>
                <el-table-column prop="nickname" label="昵称"></el-table-column>
                <el-table-column prop="email" label="邮箱"></el-table-column>
                <el-table-column prop="role" label="角色">
                    <template #default="scope"><el-tag :type="scope.row.role === 'admin' ? 'danger' : 'success'">{{ scope.row.role === 'admin' ? '管理员' : '普通用户' }}</el-tag></template>
                </el-table-column>
                <el-table-column prop="is_active" label="状态">
                    <template #default="scope"><el-tag :type="scope.row.is_active ? 'success' : 'warning'">{{ scope.row.is_active ? '活跃' : '禁用' }}</el-tag></template>
                </el-table-column>
                <el-table-column prop="created_at" label="创建时间" width="180"></el-table-column>
                <el-table-column label="操作" width="200">
                    <template #default="scope">
                        <el-button size="small" @click="editUser(scope.row)">编辑</el-button>
                        <el-button size="small" type="danger" @click="deleteUser(scope.row.id)">删除</el-button>
                    </template>
                </el-table-column>
            </el-table>
            <el-dialog title="添加用户" v-model="showAddUser">
                <el-form :model="userForm" ref="userFormRef">
                    <el-form-item prop="username"><el-input v-model="userForm.username" placeholder="用户名"></el-input></el-form-item>
                    <el-form-item prop="nickname"><el-input v-model="userForm.nickname" placeholder="昵称"></el-input></el-form-item>
                    <el-form-item prop="email"><el-input v-model="userForm.email" placeholder="邮箱"></el-input></el-form-item>
                    <el-form-item prop="password"><el-input v-model="userForm.password" type="password" placeholder="密码"></el-input></el-form-item>
                    <el-form-item prop="role">
                        <el-select v-model="userForm.role" placeholder="角色">
                            <el-option label="普通用户" value="user"></el-option>
                            <el-option label="管理员" value="admin"></el-option>
                        </el-select>
                    </el-form-item>
                </el-form>
                <template #footer>
                    <el-button @click="showAddUser = false">取消</el-button>
                    <el-button type="primary" @click="submitUser">确定</el-button>
                </template>
            </el-dialog>
        </div>
    </script>

    <script type="text/x-template" id="schedule-management-template">
        <div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <div><el-input v-model="searchQuery" placeholder="搜索日程名称" style="width: 300px;" @input="searchSchedules"></el-input></div>
                <el-button type="primary" @click="showAddSchedule = true">添加日程</el-button>
            </div>
            <el-table :data="store.schedules" border style="width: 100%;" :loading="store.loading">
                <el-table-column prop="id" label="ID" width="80"></el-table-column>
                <el-table-column prop="event_name" label="日程名称"></el-table-column>
                <el-table-column prop="location" label="地点"></el-table-column>
                <el-table-column prop="start_time" label="开始时间" width="180"></el-table-column>
                <el-table-column prop="priority" label="优先级">
                    <template #default="scope"><el-tag :type="{high: 'danger', medium: 'warning', low: 'success'}[scope.row.priority]">{{ {high: '高', medium: '中', low: '低'}[scope.row.priority] }}</el-tag></template>
                </el-table-column>
                <el-table-column prop="status" label="状态">
                    <template #default="scope"><el-tag :type="scope.row.status === 'completed' ? 'success' : 'warning'">{{ scope.row.status === 'completed' ? '已完成' : '进行中' }}</el-tag></template>
                </el-table-column>
                <el-table-column prop="description" label="描述"></el-table-column>
                <el-table-column label="操作" width="200">
                    <template #default="scope">
                        <el-button size="small" @click="editSchedule(scope.row)">编辑</el-button>
                        <el-button size="small" type="danger" @click="deleteSchedule(scope.row.id)">删除</el-button>
                    </template>
                </el-table-column>
            </el-table>
            <el-dialog title="添加日程" v-model="showAddSchedule">
                <el-form :model="scheduleForm" ref="scheduleFormRef">
                    <el-form-item prop="event_name"><el-input v-model="scheduleForm.event_name" placeholder="日程名称"></el-input></el-form-item>
                    <el-form-item prop="location"><el-input v-model="scheduleForm.location" placeholder="地点"></el-input></el-form-item>
                    <el-form-item prop="start_time"><el-date-picker v-model="scheduleForm.start_time" type="datetime" placeholder="开始时间"></el-date-picker></el-form-item>
                    <el-form-item prop="priority">
                        <el-select v-model="scheduleForm.priority" placeholder="优先级">
                            <el-option label="高" value="high"></el-option>
                            <el-option label="中" value="medium"></el-option>
                            <el-option label="低" value="low"></el-option>
                        </el-select>
                    </el-form-item>
                    <el-form-item prop="description"><textarea v-model="scheduleForm.description" placeholder="描述" style="width: 100%; min-height: 80px; padding: 8px; border: 1px solid #dcdfe6; border-radius: 4px;"></textarea></el-form-item>
                </el-form>
                <template #footer>
                    <el-button @click="showAddSchedule = false">取消</el-button>
                    <el-button type="primary" @click="submitSchedule">确定</el-button>
                </template>
            </el-dialog>
        </div>
    </script>

    <script type="text/x-template" id="knowledge-base-template">
        <div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <div><el-input v-model="searchQuery" placeholder="搜索知识库内容" style="width: 300px;" @input="searchKnowledge"></el-input></div>
                <el-button type="primary" @click="showAddKnowledge = true">添加知识</el-button>
            </div>
            <el-table :data="store.knowledgeList" border style="width: 100%;" :loading="store.loading.value">
                <el-table-column prop="id" label="ID" width="80"></el-table-column>
                <el-table-column prop="title" label="标题"></el-table-column>
                <el-table-column prop="category" label="分类"><template #default="scope"><el-tag type="info">{{ scope.row.category }}</el-tag></template></el-table-column>
                <el-table-column prop="source_type" label="来源" width="100"></el-table-column>
                <el-table-column prop="created_at" label="创建时间" width="180"></el-table-column>
                <el-table-column label="操作" width="150">
                    <template #default="scope">
                        <el-button size="small" @click="viewKnowledge(scope.row)">查看</el-button>
                        <el-button size="small" type="danger" @click="deleteKnowledge(scope.row.id)">删除</el-button>
                    </template>
                </el-table-column>
            </el-table>
            <el-dialog title="添加知识" v-model="showAddKnowledge">
                <el-form :model="knowledgeForm" ref="knowledgeFormRef">
                    <el-form-item prop="title"><el-input v-model="knowledgeForm.title" placeholder="标题"></el-input></el-form-item>
                    <el-form-item prop="content"><textarea v-model="knowledgeForm.content" placeholder="内容" rows="5" style="width: 100%; padding: 8px; border: 1px solid #dcdfe6; border-radius: 4px;"></textarea></el-form-item>
                    <el-form-item prop="category">
                        <el-select v-model="knowledgeForm.category" placeholder="分类">
                            <el-option label="学习资料" value="学习资料"></el-option>
                            <el-option label="通知公告" value="通知公告"></el-option>
                            <el-option label="常见问题" value="常见问题"></el-option>
                            <el-option label="AI分析" value="AI分析"></el-option>
                            <el-option label="其他" value="其他"></el-option>
                        </el-select>
                    </el-form-item>
                </el-form>
                <template #footer>
                    <el-button @click="showAddKnowledge = false">取消</el-button>
                    <el-button type="primary" @click="submitKnowledge">确定</el-button>
                </template>
            </el-dialog>
            <el-dialog title="知识详情" v-model="showViewKnowledge">
                <h4>{{ viewItem.title }}</h4>
                <div style="margin-top: 15px; padding: 10px; background: #f5f5f5; border-radius: 4px;">{{ viewItem.content }}</div>
            </el-dialog>
        </div>
    </script>

    <script type="text/x-template" id="collected-info-template">
        <div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <div><el-input v-model="searchQuery" placeholder="搜索采集信息" style="width: 300px;" @input="searchCollected"></el-input></div>
                <el-button type="primary" @click="collectInfo">采集信息</el-button>
            </div>
            <el-table :data="store.collectedList" border style="width: 100%;" :loading="store.loading.value">
                <el-table-column prop="id" label="ID" width="80"></el-table-column>
                <el-table-column prop="source" label="来源"></el-table-column>
                <el-table-column prop="content" label="内容"></el-table-column>
                <el-table-column prop="source_type" label="类型" width="100"><template #default="scope"><el-tag type="info">{{ scope.row.source_type }}</el-tag></template></el-table-column>
                <el-table-column prop="created_at" label="采集时间" width="180"></el-table-column>
                <el-table-column label="操作" width="150">
                    <template #default="scope"><el-button size="small" type="danger" @click="deleteCollected(scope.row.id)">删除</el-button></template>
                </el-table-column>
            </el-table>
        </div>
    </script>

    <script type="text/x-template" id="reminders-template">
        <div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <div><el-input v-model="searchQuery" placeholder="搜索提醒内容" style="width: 300px;" @input="searchReminders"></el-input></div>
            </div>
            <el-table :data="store.reminders" border style="width: 100%;" :loading="store.loading.value">
                <el-table-column prop="id" label="ID" width="80"></el-table-column>
                <el-table-column prop="user_id" label="用户ID" width="100"></el-table-column>
                <el-table-column prop="username" label="用户名" width="120"></el-table-column>
                <el-table-column prop="event_name" label="提醒内容"></el-table-column>
                <el-table-column prop="remind_time" label="提醒时间" width="180"><template #default="scope">{{ store.formatDate(scope.row.remind_time) }}</template></el-table-column>
                <el-table-column prop="status" label="状态" width="100">
                    <template #default="scope"><el-tag :type="scope.row.status === 'sent' ? 'success' : 'warning'">{{ scope.row.status === 'sent' ? '已发送' : '待发送' }}</el-tag></template>
                </el-table-column>
                <el-table-column prop="sent_at" label="发送时间" width="180"><template #default="scope">{{ store.formatDate(scope.row.sent_at) }}</template></el-table-column>
            </el-table>
        </div>
    </script>

    <script type="text/x-template" id="push-message-template">
        <div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <div><el-input v-model="searchQuery" placeholder="搜索推送内容" style="width: 300px;" @input="searchPush"></el-input></div>
                <el-button type="primary" @click="showSendPush = true">发送推送</el-button>
            </div>
            <el-table :data="store.pushList" border style="width: 100%;" :loading="store.loading">
                <el-table-column prop="id" label="ID" width="80"></el-table-column>
                <el-table-column prop="title" label="标题"></el-table-column>
                <el-table-column prop="content" label="内容"></el-table-column>
                <el-table-column prop="push_type" label="推送类型" width="120"><template #default="scope"><el-tag type="info">{{ scope.row.push_type }}</el-tag></template></el-table-column>
                <el-table-column prop="status" label="状态">
                    <template #default="scope"><el-tag :type="scope.row.status === 'sent' ? 'success' : 'warning'">{{ scope.row.status === 'sent' ? '已发送' : '待发送' }}</el-tag></template>
                </el-table-column>
                <el-table-column prop="created_at" label="创建时间" width="180"></el-table-column>
            </el-table>
            <el-dialog title="发送推送" v-model="showSendPush">
                <el-form :model="pushForm" ref="pushFormRef">
                    <el-form-item prop="title"><el-input v-model="pushForm.title" placeholder="标题"></el-input></el-form-item>
                    <el-form-item prop="content"><textarea v-model="pushForm.content" placeholder="内容" rows="5" style="width: 100%; padding: 8px; border: 1px solid #dcdfe6; border-radius: 4px;"></textarea></el-form-item>
                    <el-form-item prop="push_type">
                        <el-select v-model="pushForm.push_type" placeholder="推送类型">
                            <el-option label="系统通知" value="system"></el-option>
                            <el-option label="日程提醒" value="schedule"></el-option>
                            <el-option label="消息通知" value="message"></el-option>
                        </el-select>
                    </el-form-item>
                </el-form>
                <template #footer>
                    <el-button @click="showSendPush = false">取消</el-button>
                    <el-button type="primary" @click="sendPush">发送</el-button>
                </template>
            </el-dialog>
        </div>
    </script>

    <script type="text/x-template" id="smart-push-template">
        <div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <div>
                    <span style="margin-right: 20px;">服务状态：</span>
                    <el-tag :type="store.serviceStatus === 'running' ? 'success' : 'warning'">{{ store.serviceStatus === 'running' ? '运行中' : '已停止' }}</el-tag>
                    <span style="margin-left: 20px; margin-right: 10px;">AI增强：</span>
                    <el-switch v-model="store.useAIEnhancement" active-text="已启用" inactive-text="已禁用" @change="toggleAIEnhancement"></el-switch>
                </div>
                <div>
